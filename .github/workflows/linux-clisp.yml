name: FriCAS CI on Linux on CLISP

on: [workflow_dispatch, workflow_call]
permissions: {}

jobs:
  build:

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    env:
      ARCH: ${{ endsWith(matrix.os, '-arm') && 'arm64' || 'x86-64' }}

    steps:
    - uses: actions/checkout@v7

    - name: install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install clisp libxpm-dev

    - name: configure
      run: ./configure --with-lisp=clisp --with-x || (cat config.log && false)

    - name: make
      run: make -j4 --output-sync

    - name: Create artifact archives
      run: |
        tar -cjf FriCAS-linux-CLISP-${{ env.ARCH }}-${{ github.sha }}.tar.bz2 target/

    - name: Upload Linux binary
      uses: actions/upload-artifact@v7
      with:
        archive: false
        path: FriCAS-linux-CLISP-${{ env.ARCH }}-${{ github.sha }}.tar.bz2

    - name: make check
      run: make check -j4 --output-sync
