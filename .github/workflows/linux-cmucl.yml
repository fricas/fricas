name: FriCAS CI on Linux on CMUCL

on: [workflow_dispatch, workflow_call]
permissions: {}

jobs:
  build:

    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v6

    - name: install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install libc6-dev-i386
        wget https://common-lisp.net/project/cmucl/downloads/release/21f/cmucl-21f-x86-linux.tar.xz
        sudo tar xvf cmucl-21f-x86-linux.tar.xz -C /usr

    - name: configure
      run: ./configure --with-lisp=lisp || cat config.log

    - name: make
      run: make -j4 --output-sync

    - name: Create artifact archives
      run: |
        tar -cjf FriCAS-linux-CMUCL-x86-${{ github.sha }}.tar.bz2 target/

    - name: Upload Linux binary
      uses: actions/upload-artifact@v7
      with:
        archive: false
        path: FriCAS-linux-CMUCL-x86-${{ github.sha }}.tar.bz2

    - name: make check
      run: make check -j4 --output-sync
